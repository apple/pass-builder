syntax = "proto3";
package pass;

option swift_prefix = "PB";

// Text Alignment Enum
enum PassTextAlignment {
    TEXT_ALIGNMENT_UNSPECIFIED = 0;
    TEXT_ALIGNMENT_LEFT = 1;
    TEXT_ALIGNMENT_CENTER = 2;
    TEXT_ALIGNMENT_RIGHT = 3;
    TEXT_ALIGNMENT_NATURAL = 4;
}
