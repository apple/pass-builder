syntax = "proto3";
package pass;

import "PassFieldsList.proto";
import "PassFieldsTemplateCustomization.proto";
import "PassSemantics.proto";
import "google/protobuf/timestamp.proto";

option swift_prefix = "PB";

// Upcoming Pass Information Entry
// An entry that represents upcoming event or pass information that can be displayed
// in the Additional Info section below a pass.
message UpcomingPassInformationEntry {
    // (Required) A string that uniquely identifies the upcoming pass information entry.
    // The identifier needs to be unique for each upcoming information entry.
    string identifier = 1;

    // (Required) The name of the upcoming pass information entry.
    string name = 2;

    // (Required) The type of upcoming pass information entry.
    // The only value currently supported is "event".
    string type = 3;

    // A collection of URLs used to populate UI elements in the details view.
    URLs urls = 4;

    // An array of App Store identifiers for apps associated with the upcoming pass information entry.
    // The associated app on a device is the first item in the array that's compatible with that device.
    // This key works only for upcoming pass information entries for an event.
    repeated int32 auxiliary_store_identifiers = 6;

    // The fields of information displayed on the Additional Info section below a pass.
    optional PassFieldsList additional_info_fields = 5;

    // The fields of information displayed on the details view of the upcoming pass information entry.
    optional PassFieldsList back_fields = 7;

    // The customization to apply to the pkpasstemplate.
    PassFieldsTemplateCustomization field_customization = 8;
    
    // Information about the start and end time of the upcoming pass information entry.
    // If omitted, the entry is labeled as TBD.
    DateInformation date_information = 9;

    // A collection of image names used to populate images in the details view.
    Images images = 10;

    // Indicates whether the upcoming pass information entry is currently active.
    // The default value is false.
    bool is_active = 11;

    // The semantic, machine-readable metadata about the upcoming pass information entry.
    PassSemantics semantics = 12;

    // A collection of URLs used to populate UI elements in the details view.
    message URLs {
        // A URL that links to your or the venue's accessibility content.
        optional string accessibility_url = 1;

        // A URL that links to experiences that you can add on to your ticket or that allows you to access your
        // existing pre-purchased or preloaded add-on experiences, including any necessary QR or barcode links.
        optional string add_on_url = 2;

        // A URL that links out to the bag policy of the venue.
        optional string bag_policy_url = 3;

        // The preferred email address to contact the venue, event, or issuer.
        optional string contact_venue_email = 4;

        // The preferred phone number to contact the venue, event, or issuer.
        optional string contact_venue_phone_number = 5;

        // A URL that links the user to the website of the venue, event, or issuer.
        optional string contact_venue_website = 6;

        // A URL that links to content you have about getting to the venue.
        optional string directions_information_url = 7;

        // A URL that links to order merchandise for the specific event.
        optional string merchandise_url = 8;

        // A URL that links out to the food-ordering page for the venue.
        optional string order_food_url = 9;

        // A URL that links to any information you have about parking.
        optional string parking_information_url = 10;

        // A URL that links to your experience to buy or access prepaid parking or general parking information.
        optional string purchase_parking_url = 11;

        // A URL that launches the user into the issuer's flow for selling their current ticket.
        optional string sell_url = 12;

        // A URL that launches the user into the issuer's flow for transferring the current ticket.
        optional string transfer_url = 13;

        // A URL that links to documentation you have about public or private transit to the venue.
        optional string transit_information_url = 14;
    }

    // DateInformation - Information about the start and end time of the upcoming pass information entry
    message DateInformation {
        // The start date of the upcoming pass information entry.
        // If omitted, the entry lists the Time and Date as TBD.
        // Unix timestamp in seconds.
        google.protobuf.Timestamp date = 1;

        // Indicates whether the entry should ignore the time components of the date.
        bool ignore_time_components = 2;

        // Indicates whether the entry spans the entire day and that the time components should be ignored.
        bool is_all_day = 3;

        // Indicates whether the provided time of the event hasn't been announced (commonly referred to as TBA).
        bool is_unannounced = 4;

        // Indicates whether the provided time of the event hasn't been determined (commonly referred to as TBD).
        bool is_undetermined = 5;

        // The time zone to adjust the date into. If omitted, the entry uses the current time zone of the device.
        // This could be represented as a timezone identifier string (e.g., "America/New_York") or Unix timestamp.
        // Using string for timezone identifier.
        string time_zone = 6;
    }

    // A collection of image names used to populate images in the details view
    message Images {
        // The name of the image file used for the header image on the details screen.
        // This can be a remote asset.
        Image header_image = 1;

        // The name of the image file used for the venue map in the event guide for each upcoming pass information
        // entry. This can be a remote asset and is available for event entries.
        Image venue_map = 2;
    }

    // An object that represents the image shown within the detail views of upcoming pass information entries
    message Image {
        // A list of URLs used to retrieve an image. The upcoming pass information entry uses the item that best
        // matches the device's scale.
        repeated ImageURLEntry urls = 1;

        // Indicates whether to use the local equivalent image instead of the image specified by URLs.
        bool reuse_existing = 2;
    }

    // An object that represents the image specifications for the upcoming pass information entry
    message ImageURLEntry {
        // (Required) The SHA256 hash of the image.
        string sha256 = 1;

        // (Required) The URL that points to the image asset to be downloaded. This must be an https link.
        string url = 2;

        // The scale of the image. If unspecified, defaults to 1.
        double scale = 3;

        // Size of the image asset in bytes. The maximum allowed size is 2 megabytes (2,097,152 bytes).
        int32 size = 4;
    }
}
