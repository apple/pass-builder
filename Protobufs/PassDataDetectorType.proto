syntax = "proto3";
package pass;

option swift_prefix = "PB";

// Data Detector Type Enum
enum PassDataDetectorType {
    DATA_DETECTOR_TYPE_UNSPECIFIED = 0;
    DATA_DETECTOR_TYPE_PHONE_NUMBER = 1;
    DATA_DETECTOR_TYPE_LINK = 2;
    DATA_DETECTOR_TYPE_ADDRESS = 3;
    DATA_DETECTOR_TYPE_CALENDAR_EVENT = 4;
}
