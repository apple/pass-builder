syntax = "proto3";
package pass;

option swift_prefix = "PB";

// A message that represents a pass action.
message PassAction {
    // A unique ID for the action.
    string identifier = 1;

    // The action type to perform.
    string action_type = 2;

    // The URL to pass to the action, if applicable.
    optional string url = 3;
}
