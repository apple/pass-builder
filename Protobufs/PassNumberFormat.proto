syntax = "proto3";
package pass;

option swift_prefix = "PB";

// Number Format Enum
enum PassNumberFormat {
    NUMBER_FORMAT_UNSPECIFIED = 0;
    NUMBER_FORMAT_DECIMAL = 1;
    NUMBER_FORMAT_PERCENT = 2;
    NUMBER_FORMAT_SCIENTIFIC = 3;
    NUMBER_FORMAT_SPELL_OUT = 4;
}

