syntax = "proto3";
package pass;

option swift_prefix = "PB";

// An image file within a pass package.
// Use `PassImageFile` to configure individual image assets (such as icons and logos) in a pass package.
message PassImageFile {
    // (Required) The path to the image asset.
    string image_path = 1;
}
