syntax = "proto3";
package pass;

option swift_prefix = "PB";

// Date/Time Format Enum
enum PassDateTimeFormat {
    DATE_TIME_FORMAT_UNSPECIFIED = 0;
    DATE_TIME_FORMAT_NONE = 1;
    DATE_TIME_FORMAT_SHORT = 2;
    DATE_TIME_FORMAT_MEDIUM = 3;
    DATE_TIME_FORMAT_LONG = 4;
    DATE_TIME_FORMAT_FULL = 5;
}
