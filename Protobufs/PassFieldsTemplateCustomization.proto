syntax = "proto3";
package pass;

import "PassFieldValue.proto";

option swift_prefix = "PB";

// Represents customization data for a pass template's fields.
// Used to override default values and visibility of fields in a pass template.
message PassFieldsTemplateCustomization {
    // Maps field keys to their customized values.
    // Keys are field identifiers, values are custom field values to apply.
    map<string, PassFieldValue> value_for_key = 1;
    
    // Maps field keys to their visibility settings.
    // Keys are field identifiers, values determine if the field should be visible.
    map<string, bool> visibility_for_key = 2;
}
